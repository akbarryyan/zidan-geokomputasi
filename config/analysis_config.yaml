project:
  name: "Analisis dan Visualisasi Kimia Air Panas Bumi"

input:
  file_path: "docs/data-mentah/Kimia Air_Tugas 1.xlsx"
  sheet_name: "Air"
  # Baris 0 = judul "Hasil Analisa Kimia Air" → dilewati
  # Baris 1 = header dengan label kolom (Nama, ID, T(°C), pH, TDS, Li, Na, K, Ca, Mg, SiO2, B, Cl, SO4, HCO3)
  # Baris 2 = baris unit (Nama, ID, T(°C), pH, TDS, mg/kg, mg/kg, ...) → dilewati
  # Baris 3+ = data sampel (Semar Kawah, SK, 55, 2.32, ...)
  skip_rows: [0, 2]

ion_balance_input:
  file_path: "docs/data-mentah/Tugas 1_Ion Balance.xlsx"
  sheet_name: "IB"
  # Baris 1 berisi satuan mg/kg.
  skip_rows: [1]

powell_reference:
  file_path: "docs/data-referensi/Contoh_liquid_analysis_v3_powell-cumming_2010_stanfordgw.xlsx"

output:
  processed_directory: "data/processed"
  interim_directory: "data/interim"
  figures_directory: "outputs/figures"
  reports_directory: "outputs/reports"

cleaning:
  missing_markers:
    - ""
    - "-"
    - "—"
    - "NA"
    - "N/A"
    - "null"
    - "None"
  detection_limit_strategy: "half"
  remove_exact_duplicates: true
  convert_negative_concentration_to_nan: true

ph_classification:
  acidic_max: 6.5
  neutral_max: 7.5

fluid_classification:
  mixed_threshold: 10.0
  minimum_valid_ions: 2

visualization:
  dpi: 300
  figure_width: 10
  figure_height: 6
  show_sample_labels: true

geothermometry:
  # Geotermometer yang diaktifkan
  silica:
    enabled: true
    # quartz berlaku > 150 °C, chalcedony untuk 25-180 °C
  nk:
    enabled: true
    # Na/K berlaku untuk fluida reservoir matang
  kmg:
    enabled: true
    # K/Mg sensitif terhadap keseimbangan suhu rendah
  note: >
    Semua hasil geotermometer bersifat indikatif.
    Interpretasi akhir memerlukan pengetahuan geologi dan kondisi lapangan.
